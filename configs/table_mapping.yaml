# ============================================================================
# SECURE TABLE/DATASET MAPPING CONFIGURATION
# ============================================================================
# This file maps dataset IDs to real file/schema paths.
# ⚠️  THIS FILE IS CONFIDENTIAL — Never log its contents.
# Keep this file in restricted-access config storage.
# ============================================================================

datasets:
  DS_001:
    file_path: data/raw/global_health_data.csv
    schema_path: schemas/health_schema.json
    description: "Health dataset"

# ============================================================================
# SECURITY SETTINGS
# ============================================================================

# If true, DEBUG-level logs may show real names (for restricted-access logs only)
# Set to false in production/audit environments
allow_debug_real_names: false

# Column masking mode: "hash" or "index"
# hash  → COL_a1b2c3 (SHA-256 based, consistent across runs)
# index → COL_001, COL_002 (sequential, based on schema order)
column_mask_mode: hash
